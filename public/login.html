<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - ChatWidget</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0b0f19; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Satoshi', sans-serif; color: #6366f1; font-size: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div>Connecting to secure server...</div>

  <script
    async
    crossorigin="anonymous"
    data-clerk-publishable-key="pk_test_c29jaWFsLWdvcGhlci02My5jbGVyay5hY2NvdW50cy5kZXYk"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
  </script>

  <script>
    window.addEventListener("load", async function () {
      try {
        await window.Clerk.load();

        if (window.Clerk.user) {
          const token = await window.Clerk.session.getToken();
          localStorage.setItem('token', token);
          localStorage.setItem('user', JSON.stringify({
            name: window.Clerk.user.fullName || window.Clerk.user.primaryEmailAddress?.emailAddress,
            email: window.Clerk.user.primaryEmailAddress?.emailAddress
          }));
          window.location.href = 'dashboard.html';
        } else {
          window.Clerk.redirectToSignIn({
            redirectUrl: window.location.origin + '/dashboard.html'
          });
        }
      } catch (err) {
        console.error("Clerk failed:", err);
        document.body.innerText = "Failed to connect. Please refresh.";
      }
    });
  </script>
</body>
</html>
